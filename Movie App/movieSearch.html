<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Movie</title>
    <link rel="stylesheet" href="../src/output.css" />
  </head>
  <body class="bg-gray-100 min-h-screen">
    <div class="flex justify-center gap-3 p-5">
      <input
        type="text"
        id="searchField"
        placeholder="Search movie"
        class="border border-gray-300 rounded-xl px-4 py-2 w-72 outline-none focus:ring-2 focus:ring-black"
      />

      <button
        id="searchBtn"
        class="bg-black text-white px-5 py-2 rounded-xl hover:bg-gray-800 duration-300"
      >
        Search
      </button>
    </div>

    <div id="cards" class="grid grid-cols-1 md:grid-cols-4 gap-6 p-5">
      <div class="bg-white rounded-2xl shadow-md overflow-hidden">
        <img
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRnXEwQlva93WuBdWDK6LlOSf4f96CB5OxToqcdkHiWBnn2p5WOjaOGKo_t6i9F-gQ2tYUp&s=10"
          alt=""
          class="w-full h-80 object-cover"
        />

        <div class="p-4">
          <h2 class="text-xl font-bold">Avengers Endgame</h2>

          <p class="text-gray-600 mt-2">Year: 2019</p>

          <p class="text-gray-600">Type: Movie</p>
        </div>
      </div>
      <div class="bg-white rounded-2xl shadow-md overflow-hidden">
        <img
          src="https://encrypted-tbn3.gstatic.com/images?q=tbn:ANd9GcTopMyXoextOjYCnOvi8KQv8xRh4tpLwrit3cLtaj0BiKywA6je"
          alt=""
          class="w-full h-80 object-cover"
        />

        <div class="p-4">
          <h2 class="text-xl font-bold">Man of Steel</h2>

          <p class="text-gray-600 mt-2">Year: 2013</p>

          <p class="text-gray-600">Type: Movie</p>
        </div>
      </div>
      <div class="bg-white rounded-2xl shadow-md overflow-hidden">
        <img
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTCythtaM-iOKWi0JUUiQtcC3CH8o9bhUDiaFY53ZRWXFa4mGuVRFevtTZlWDusVoP6dl3e&s=10"
          alt=""
          class="w-full h-80 object-cover"
        />

        <div class="p-4">
          <h2 class="text-xl font-bold">Iron man</h2>

          <p class="text-gray-600 mt-2">Year: 2008</p>

          <p class="text-gray-600">Type: Movie</p>
        </div>
      </div>
      <div class="bg-white rounded-2xl shadow-md overflow-hidden">
        <img
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRIMCpS3OjmxGAhuR99vetHATrUSMK2Cih6TB10Dnk9op5yB-y4DEVQsw9h3814Z8MirrCe&s=10"
          alt=""
          class="w-full h-80 object-cover"
        />

        <div class="p-4">
          <h2 class="text-xl font-bold">The batman</h2>

          <p class="text-gray-600 mt-2">Year: 2022</p>

          <p class="text-gray-600">Type: Movie</p>
        </div>
      </div>
    </div>

    <script>
      const MY_API = "d9a332dc";
      let searchField = document.getElementById("searchField");
      let searchBtn = document.getElementById("searchBtn");
      let cards = document.getElementById("cards");

      searchBtn.addEventListener("click", async () => {
        cards.innerHTML = " loading...";
        let search = searchField.value;

        let response = await fetch(
          `https://www.omdbapi.com/?s=${search}&apikey=${MY_API}`,
        );
        let data = await response.json();
        if (data.Response === "False") {
          cards.innerHTML = `
        <h1 class="text-2xl font-bold">
            Movie not found
        </h1>
    `;
          return;
        }
        cards.innerHTML = "";
        data.Search.forEach((movie) => {
          console.log(movie);

          cards.innerHTML += `

<div class="bg-white rounded-2xl shadow-md overflow-hidden">

    <img
      src="${movie.Poster}"
      alt=""
      class="w-full h-80 object-cover"
    />

    <div class="p-4">

      <h2 class="text-xl font-bold">
        ${movie.Title}
      </h2>

      <p class="text-gray-600 mt-2">
        Year: ${movie.Year}
      </p>

      <p class="text-gray-600">
        Type: ${movie.Type}
      </p>

    </div>

</div>

`;
        });
      });
    </script>
  </body>
</html>
